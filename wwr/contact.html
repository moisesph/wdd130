            <p>+1 999 999 9999</p>

<section class="contact-section">
    <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d5319.240788994978!2d-87.26581722619702!3d13.989239851287905!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2shn!4v1760501074722!5m2!1ses-419!2shn"

    </div>


    
    <div class="form-container">
        <form>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail" required>

            <div class="purpose-group-wrapper">
                <div class="purpose-label">
                    <span>Message</span>
                    <span>Purpose:</span>
                </div>
                <div class="purpose-group">
                    <label><input type="checkbox" name="purpose" value="general"> General Inquiry</label>
                    <label><input type="checkbox" name="purpose" value="reservation"> Reservation Question</label>
                    <label><input type="checkbox" name="purpose" value="website"> Website Suggestion</label>
                </div>
            </div>


            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            
            <label class="subscribe">
                <input type="checkbox" name="subscribe">
                <span>Please subscribe me to the monthly newsletter</span>
            </label>


            <button type="submit">Get in Touch!</button>
        </form>
    </div>
</section>
